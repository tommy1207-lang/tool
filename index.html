<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC Image Background Remover</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;

            --secondary-hover: #374151;

            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;

        .container {

            margin: 0 auto;

        /* 頂部標題區 */

        .header h1 {
            font-size: 2.25rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .steps {
            display: flex;
            justify-content: center;

            flex-wrap: wrap;
        }

        .step-card {
            background-color: var(--accent-bg);
            color: var(--primary-color);
            padding: 8px 16px;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            border: 1px solid #bfdbfe;

        /* 搜尋區 */
        .search-section {
            background-color: var(--surface-color);

            display: flex;

        .results-section {

                linear-gradient(45deg, #e5e7eb 25%, transparent 25%),

                linear-gradient(45deg, #e5e7eb 25%, transparent 25%);
            background-size: 20px 20px;

        .actions {
            display: flex;

        .fallback-tools {
            padding-top: 24px;

            .actions button { width: 100%; }
            .attribution-section { flex-direction: column; align-items: flex-start; }

        }

        @media (max-width: 480px) {
            .image-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <h1>CC Image Background Remover</h1>
        <p>搜尋 CC 圖片，選圖，一鍵去背，下載透明 PNG</p>
        <div class="steps">
            <span class="step-card">Step 1 搜尋圖片</span>
            <span class="step-card">Step 2 選擇圖片</span>
            <span class="step-card">Step 3 去背下載</span>
        </div>
    </header>

    <section class="search-section">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="輸入關鍵字，例如 cat、robot、flower">
            <button class="btn-primary" onclick="searchImages()">搜尋圖片</button>
            <button class="btn-secondary" onclick="changeBatch()">換一批</button>
        </div>
        <div class="status-bar" id="statusBar">請輸入關鍵字開始搜尋</div>
    </section>

    <section class="results-section">
        <div class="image-grid" id="imageGrid">
            </div>
    </section>

    <section class="process-section">
        <div class="preview-grid">
            <div class="preview-box">
                <span class="preview-label">原圖預覽</span>
                <div class="preview-placeholder" id="originalPlaceholder">請先選擇圖片</div>
                <img id="originalImg" style="display: none;" crossorigin="anonymous">
            </div>
            <div class="preview-box checkerboard">
                <span class="preview-label">去背後預覽</span>
                <div class="preview-placeholder" id="resultPlaceholder">去背結果會顯示在這裡</div>
                <img id="resultImg" style="display: none;">
            </div>
        </div>

        <div class="actions">
            <button class="btn-primary" id="btnAiRemove" onclick="removeSelectedImageBackground()" disabled>一鍵去背</button>
            <button class="btn-primary" id="btnDownload" onclick="downloadPNG()" disabled style="background-color: var(--success-color);">下載 PNG</button>
        </div>

        <div class="fallback-tools">
            <span style="color: var(--text-muted);">AI 失敗時可用，適合白底或單色背景：</span>
            <div class="tool-group">
                <button class="btn-secondary" onclick="fallbackWhiteRemove()" id="btnWhiteRemove" disabled>白底去背</button>
                <button class="btn-secondary" onclick="enablePickColor()" id="btnColorRemove" disabled>選色去背</button>
                <label style="display: flex; align-items: center; gap: 8px; font-size: 0.875rem;">
                    容差
                    <input type="range" id="toleranceSlider" min="0" max="100" value="30">
                </label>
            </div>
        </div>
    </section>

    <section class="attribution-section">
        <div class="attribution-text" id="attributionText">尚未選擇圖片</div>
        <button class="btn-secondary" onclick="copyAttribution()" id="btnCopy" disabled>複製標示</button>
    </section>
</div>

<script type="module">
    import { removeBackground } from "https://cdn.jsdelivr.net/npm/@imgly/background-removal/+esm";
    window.imglyRemoveBackground = removeBackground;
</script>

<script>
    // 全局變數
    let currentImagePool = []; // 儲存所有搜尋到的合格圖片
    let currentBatchIndex = 0; // 目前顯示的批次索引
    let currentSelectedImage = null; // 目前選擇的圖片資料物件
    let processedCanvasUrl = null; // 去背後的 DataURL 或 Blob URL
    let isPickingColor = false; // 是否處於選色去背狀態

    // 使用 weserv 代理避免 Canvas 和 AI 處理時的 CORS 問題
    const getProxyUrl = (url) => `https://images.weserv.nl/?url=${encodeURIComponent(url)}`;

    /**
     * 更新狀態列文字
     */
    function showStatus(message) {
        document.getElementById('statusBar').textContent = message;
    }

    /**
     * 重置選取狀態
     */
    function resetSelection() {
        currentSelectedImage = null;
        processedCanvasUrl = null;
        isPickingColor = false;

        document.getElementById('originalImg').style.display = 'none';
        document.getElementById('originalImg').src = '';
        document.getElementById('originalImg').style.cursor = 'default';
        document.getElementById('originalPlaceholder').style.display = 'block';

        document.getElementById('resultImg').style.display = 'none';
        document.getElementById('resultImg').src = '';
        document.getElementById('resultPlaceholder').style.display = 'block';

        document.getElementById('btnAiRemove').disabled = true;
        document.getElementById('btnAiRemove').textContent = '一鍵去背 disabled';
        document.getElementById('btnDownload').disabled = true;
        document.getElementById('btnWhiteRemove').disabled = true;
        document.getElementById('btnColorRemove').disabled = true;
        
        document.getElementById('attributionText').textContent = '尚未選擇圖片';
        document.getElementById('btnCopy').disabled = true;

        const cards = document.querySelectorAll('.image-card');
        cards.forEach(card => card.classList.remove('selected'));
    }

    /**
     * 篩選圖片尺寸至少 800x600
     */
    function filterImagesBySize(images) {
        return images.filter(img => img.width >= 800 && img.height >= 600);
    }

    /**
     * 搜尋 Wikimedia Commons 圖片
     */
    async function fetchWikimediaImages(query) {
        const url = `https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch=filetype:bitmap|${encodeURIComponent(query)}&gsrlimit=50&prop=imageinfo&iiprop=url|size|extmetadata&format=json&origin=*`;
        try {
            const response = await fetch(url);
            const data = await response.json();
            if (!data.query || !data.query.pages) return [];

            const images = Object.values(data.query.pages).map(page => {
                const info = page.imageinfo[0];
                const meta = info.extmetadata;
                // 清理 HTML 標籤
                const creatorHtml = meta.Artist ? meta.Artist.value : 'Unknown';
                const div = document.createElement('div');
                div.innerHTML = creatorHtml;
                const cleanCreator = div.textContent || div.innerText || '';

                return {
                    title: page.title.replace(/^File:/, ''),
                    creator: cleanCreator,
                    license: meta.LicenseShortName ? meta.LicenseShortName.value : 'Public Domain / CC',
                    licenseUrl: meta.LicenseUrl ? meta.LicenseUrl.value : '',
                    imageUrl: info.url,
                    thumbnailUrl: info.url,
                    sourceUrl: info.descriptionurl,
                    width: info.width,
                    height: info.height,
                    provider: 'Wikimedia Commons'
                };
            });
            return images;
        } catch (error) {
            console.error('Wikimedia API error:', error);
            return [];
        }
    }

    /**
     * 搜尋 Openverse 圖片 (備用)
     */
    async function fetchOpenverseImages(query) {
        const url = `https://api.openverse.org/v1/images/?q=${encodeURIComponent(query)}`;
        try {
            const response = await fetch(url);
            const data = await response.json();
            if (!data.results) return [];

            const images = data.results.map(item => {
                return {
                    title: item.title,
                    creator: item.creator,
                    license: `${item.license} ${item.license_version}`,
                    licenseUrl: item.license_url,
                    imageUrl: item.url,
                    thumbnailUrl: item.thumbnail,
                    sourceUrl: item.foreign_landing_url,
                    width: item.width || 0,
                    height: item.height || 0,
                    provider: 'Openverse'
                };
            });
            return images;
        } catch (error) {
            console.error('Openverse API error:', error);
            return [];
        }
    }

    /**
     * 觸發搜尋功能
     */
    async function searchImages() {
        const query = document.getElementById('searchInput').value.trim();
        if (!query) {
            showStatus('請先輸入關鍵字');
            return;
        }

        showStatus('搜尋中...');
        currentImagePool = [];
        currentBatchIndex = 0;
        document.getElementById('imageGrid').innerHTML = '';
        resetSelection();

        try {
            // 先搜尋 Wikimedia
            let images = await fetchWikimediaImages(query);
            let validImages = filterImagesBySize(images);

            // 如果不足 5 張，補充 Openverse
            if (validImages.length < 5) {
                const openverseImages = await fetchOpenverseImages(query);
                const validOpenverse = filterImagesBySize(openverseImages);
                validImages = validImages.concat(validOpenverse);
            }

            if (validImages.length === 0) {
                showStatus('找不到符合尺寸的圖片');
                return;
            }

            currentImagePool = validImages;
            showStatus(`找到 ${currentImagePool.length} 張圖片`);
            renderImageCards();
        } catch (error) {
            showStatus('API 搜尋失敗');
        }
    }

    /**
     * 換一批圖片
     */
    function changeBatch() {
        if (currentImagePool.length === 0) return;
        
        currentBatchIndex++;
        if (currentBatchIndex * 5 >= currentImagePool.length) {
            currentBatchIndex = 0; // 循環回到開頭
        }
        
        resetSelection();
        renderImageCards();
        showStatus(`已切換至第 ${currentBatchIndex + 1} 批圖片`);
    }

    /**
     * 渲染圖片卡片 (一次 5 張)
     */
    function renderImageCards() {
        const grid = document.getElementById('imageGrid');
        grid.innerHTML = '';
        
        const start = currentBatchIndex * 5;
        const batch = currentImagePool.slice(start, start + 5);

        batch.forEach((imgData, index) => {
            const card = document.createElement('div');
            card.className = 'image-card';
            card.onclick = () => selectImage(imgData, card);

            // 使用 Proxy 載入縮圖以防 CORS，並加上寬度參數減小載入量
            const proxyThumb = getProxyUrl(imgData.thumbnailUrl) + '&w=400';

            card.innerHTML = `
                <div class="badge-selected">已選取</div>
                <img src="${proxyThumb}" alt="${imgData.title}" loading="lazy" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiNlNWU3ZWIiLz48dGV4dCB4PSI1MCUiIHk9IjUwJSIgZm9udC1zaXplPSIxNCIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZmlsbD0iIzY0NzQ4YiI+5Z+W54mH5LiN5Y+v55SoPC90ZXh0Pjwvc3ZnPg=='">
                <div class="image-info">
                    <div class="image-title" title="${imgData.title}">${imgData.title}</div>
                    <div class="image-meta">${imgData.width} × ${imgData.height} | ${imgData.license}</div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    /**
     * 選取圖片
     */
    function selectImage(imgData, cardElement) {
        resetSelection();
        currentSelectedImage = imgData;

        // 更新 UI
        cardElement.classList.add('selected');
        document.getElementById('btnAiRemove').disabled = false;
        document.getElementById('btnAiRemove').textContent = '一鍵去背';
        document.getElementById('btnWhiteRemove').disabled = false;
        document.getElementById('btnColorRemove').disabled = false;

        // 更新授權標示
        const attrText = `圖片：${imgData.title}\n作者：${imgData.creator}\n授權：${imgData.license}\n來源：${imgData.sourceUrl}\n平台：${imgData.provider}`;
        document.getElementById('attributionText').textContent = attrText;
        document.getElementById('btnCopy').disabled = false;

        showStatus('已選取圖片');
        loadSelectedImage();
    }

    /**
     * 載入選擇的圖片至預覽區
     */
    function loadSelectedImage() {
        const imgEl = document.getElementById('originalImg');
        const placeholder = document.getElementById('originalPlaceholder');
        
        placeholder.style.display = 'none';
        imgEl.style.display = 'block';
        
        // 使用 proxy 以確保 Canvas 處理不報錯
        imgEl.src = getProxyUrl(currentSelectedImage.imageUrl);
        imgEl.onload = () => {
            showStatus('圖片載入完成，可開始去背');
        };
        imgEl.onerror = () => {
            showStatus('圖片無法載入，請換一張');
            resetSelection();
        };
    }

    /**
     * AI 一鍵去背
     */
    async function removeSelectedImageBackground() {
        if (!currentSelectedImage) {
            showStatus('請先選擇圖片');
            return;
        }

        const btn = document.getElementById('btnAiRemove');
        btn.textContent = '去背中...';
        btn.disabled = true;
        showStatus('AI 處理中，請稍候 (初次載入模型需較長時間)...');

        try {
            if (!window.imglyRemoveBackground) {
                throw new Error("AI 套件未載入");
            }
            
            // 將 Proxy 圖片轉為 Blob 確保 imgly 能夠讀取
            const response = await fetch(getProxyUrl(currentSelectedImage.imageUrl));
            if (!response.ok) throw new Error("CORS 不允許處理圖片");
            const blob = await response.blob();

            const imageBlob = await window.imglyRemoveBackground(blob);
            processedCanvasUrl = URL.createObjectURL(imageBlob);
            
            showRemovedResult();
            showStatus('去背完成');
            btn.textContent = '一鍵去背';
            btn.disabled = false;
        } catch (error) {
            console.error(error);
            showStatus('AI 去背失敗，請嘗試備用工具');
            btn.textContent = '一鍵去背';
            btn.disabled = false;
        }
    }

    /**
     * 顯示去背結果
     */
    function showRemovedResult() {
        const resultImg = document.getElementById('resultImg');
        const placeholder = document.getElementById('resultPlaceholder');

        if (processedCanvasUrl) {
            placeholder.style.display = 'none';
            resultImg.style.display = 'block';
            resultImg.src = processedCanvasUrl;
            document.getElementById('btnDownload').disabled = false;
        }
    }

    /**
     * 複製授權標示
     */
    function copyAttribution() {
        const text = document.getElementById('attributionText').textContent;
        if (text === '尚未選擇圖片') return;

        navigator.clipboard.writeText(text).then(() => {
            alert('授權標示已複製到剪貼簿！');
        }).catch(() => {
            showStatus('複製標示失敗');
        });
    }

    /**
     * 下載 PNG
     */
    function downloadPNG() {
        if (!processedCanvasUrl) {
            showStatus('尚未去背就下載');
            return;
        }
        const a = document.createElement('a');
        a.href = processedCanvasUrl;
        a.download = 'cc-image-removed-background.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    /**
     * 共用的 Canvas 像素處理函式
     */
    function processCanvasPixels(pixelLogic) {
        const img = document.getElementById('originalImg');
        if (!img.src) return;

        try {
            const canvas = document.createElement('canvas');
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            const ctx = canvas.getContext('2d');
            
            // 繪製原圖
            ctx.drawImage(img, 0, 0);
            
            // 獲取像素資料
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const tolerance = parseInt(document.getElementById('toleranceSlider').value, 10);

            // 執行客製化像素處理
            pixelLogic(data, tolerance);

            // 放回像素並產出圖片
            ctx.putImageData(imageData, 0, 0);
            processedCanvasUrl = canvas.toDataURL('image/png');
            
            showRemovedResult();
            showStatus('備用去背完成');
        } catch (e) {
            console.error(e);
            showStatus('圖片無法處理，請換一張 (可能是 CORS 限制)');
        }
    }

    /**
     * Canvas 備用去背：白底去背
     */
    function fallbackWhiteRemove() {
        if (!currentSelectedImage) return;
        showStatus('處理中...');
        
        processCanvasPixels((data, tolerance) => {
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                // 判斷是否接近白色 (255, 255, 255)
                if (r >= (255 - tolerance) && g >= (255 - tolerance) && b >= (255 - tolerance)) {
                    data[i + 3] = 0; // Alpha 設為 0 (透明)
                }
            }
        });
    }

    /**
     * 啟用點擊選色去背模式
     */
    function enablePickColor() {
        if (!currentSelectedImage) return;
        isPickingColor = true;
        const imgEl = document.getElementById('originalImg');
        imgEl.style.cursor = 'crosshair';
        showStatus('請在左側「原圖預覽」點擊欲去除的背景顏色');
    }

    /**
     * 取得背景顏色 (綁定在原圖上的事件)
     */
    function pickBackgroundColor(event) {
        if (!isPickingColor) return;
        isPickingColor = false;
        
        const imgEl = document.getElementById('originalImg');
        imgEl.style.cursor = 'default';

        try {
            // 建立一個臨時 canvas 來獲取點擊位置的顏色
            const canvas = document.createElement('canvas');
            canvas.width = imgEl.width; // 顯示寬度
            canvas.height = imgEl.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(imgEl, 0, 0, canvas.width, canvas.height);

            const rect = imgEl.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;

            const pixel = ctx.getImageData(x, y, 1, 1).data;
            const targetColor = { r: pixel[0], g: pixel[1], b: pixel[2] };
            
            fallbackSelectedColorRemove(targetColor);
        } catch (e) {
            showStatus('圖片無法處理，請換一張');
        }
    }

    /**
     * Canvas 備用去背：選色去背
     */
    function fallbackSelectedColorRemove(targetColor) {
        showStatus('處理中...');
        processCanvasPixels((data, tolerance) => {
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                
                // 計算與目標顏色的距離
                const distance = Math.sqrt(
                    Math.pow(r - targetColor.r, 2) +
                    Math.pow(g - targetColor.g, 2) +
                    Math.pow(b - targetColor.b, 2)
                );

                if (distance <= tolerance) {
                    data[i + 3] = 0; // Alpha 設為 0
                }
            }
        });
    }

    // 綁定圖片點擊事件以支援選色去背
    document.getElementById('originalImg').addEventListener('click', pickBackgroundColor);

    // 支援 Enter 鍵搜尋
    document.getElementById('searchInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            searchImages();
        }
    });

</script>
