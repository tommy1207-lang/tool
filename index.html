<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CC Image Background Remover</title>
  <style>
    /* CSS 變數：乾淨專業風格 */
    :root {
      --bg-color: #f3f4f6;
      --card-bg: #ffffff;
      --text-main: #1f2937;
      --text-sub: #6b7280;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --secondary: #4b5563;
      --secondary-hover: #374151;
      --border: #e5e7eb;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --radius: 12px;
      --error: #ef4444;
      --success: #10b981;
    }

    /* 基礎設定 */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Helvetica Neue", Arial, "LiHei Pro", "微軟正黑體", sans-serif; background-color: var(--bg-color); color: var(--text-main); line-height: 1.5; padding: 20px; }
    .container { max-width: 1280px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; }
    
    /* 共用元件 */
    .card { background: var(--card-bg); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
    h1 { font-size: 1.75rem; color: var(--text-main); margin-bottom: 8px; }
    h2 { font-size: 1.25rem; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    p { color: var(--text-sub); }
    
    button { padding: 10px 16px; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: all 0.2s; font-weight: bold; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background-color: var(--primary); color: white; }
    .btn-primary:hover:not(:disabled) { background-color: var(--primary-hover); }
    .btn-secondary { background-color: var(--secondary); color: white; }
    .btn-secondary:hover:not(:disabled) { background-color: var(--secondary-hover); }
    input[type="text"] { padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; flex-grow: 1; outline: none; }
    input[type="text"]:focus { border-color: var(--primary); }

    /* 1. 頂部標題區 */
    .header-section { text-align: center; }
    .steps-container { display: flex; justify-content: center; gap: 16px; margin-top: 16px; flex-wrap: wrap; }
    .step-card { background: #e0f2fe; color: #0369a1; padding: 8px 16px; border-radius: 8px; font-weight: bold; font-size: 0.9rem; }

    /* 2. 搜尋區 */
    .search-section { display: flex; flex-direction: column; gap: 12px; }
    .search-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .search-row input { min-width: 200px; }
    .status-bar { padding: 8px 12px; border-radius: 8px; background: #fef3c7; color: #b45309; font-weight: bold; font-size: 0.9rem; text-align: center; display: none; }
    
    /* 3. 圖片結果區 */
    .results-grid { display: grid; gap: 16px; grid-template-columns: repeat(1, 1fr); margin-top: 16px; }
    @media(min-width: 768px) { .results-grid { grid-template-columns: repeat(3, 1fr); } }
    @media(min-width: 1024px) { .results-grid { grid-template-columns: repeat(5, 1fr); } }
    
    .img-card { border: 2px solid transparent; border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: 0.2s; background: var(--bg-color); display: flex; flex-direction: column; position: relative; }
    .img-card:hover { border-color: var(--primary); }
    .img-card.selected { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.3); }
    .img-card img { width: 100%; height: 160px; object-fit: cover; background: #ddd; }
    .img-info { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; gap: 4px; font-size: 0.85rem; }
    .img-title { font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-main); }
    .img-meta { color: var(--text-sub); }
    .img-btn-select { margin-top: auto; padding: 6px; font-size: 0.9rem; width: 100%; }
    .badge-selected { position: absolute; top: 8px; right: 8px; background: var(--primary); color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; display: none; }
    .img-card.selected .badge-selected { display: block; }

    /* 4. 去背與下載區 */
    .process-section { display: grid; grid-template-columns: 1fr; gap: 24px; }
    @media(min-width: 768px) { .process-section { grid-template-columns: 1fr 1fr; } }
    
    .preview-box { background: var(--bg-color); border-radius: var(--radius); height: 350px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; border: 1px solid var(--border); }
    .preview-box img, .preview-box canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
    .checkerboard {
      background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
      background-color: #fff;
    }
    .preview-label { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.85rem; }
    .empty-text { color: var(--text-sub); }

    .action-panel { display: flex; flex-direction: column; gap: 16px; margin-top: 16px; }
    .fallback-tools { background: #f9fafb; padding: 12px; border-radius: 8px; border: 1px dashed var(--border); font-size: 0.9rem; }
    .fallback-tools label { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    
    /* 5. 授權標示區 */
    .attribution-section { font-size: 0.9rem; }
    .attr-content { background: var(--bg-color); padding: 12px; border-radius: 8px; margin-bottom: 12px; word-break: break-all; }

    /* 隱藏元素與 RWD 細節 */
    .hidden { display: none !important; }
    @media(max-width: 600px) {
      .search-row { flex-direction: column; }
      .search-row button { width: 100%; }
      .btn-primary, .btn-secondary { width: 100%; }
    }
  </style>
</head>
<body>

<div class="container">

  <header class="card header-section">
    <h1>CC Image Background Remover</h1>
    <p>搜尋 CC 圖片，選圖，一鍵去背，下載透明 PNG</p>
    <div class="steps-container">
      <div class="step-card">Step 1 搜尋圖片</div>
      <div class="step-card">Step 2 選擇圖片</div>
      <div class="step-card">Step 3 去背下載</div>
    </div>
  </header>

  <section class="card search-section">
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="輸入關鍵字，例如 cat、robot、flower">
      <button class="btn-primary" id="btnSearch">搜尋圖片</button>
      <button class="btn-secondary" id="btnNextBatch">換一批</button>
    </div>
    <div id="statusBar" class="status-bar"></div>
  </section>

  <section class="card">
    <h2>圖片搜尋結果</h2>
    <div id="resultsGrid" class="results-grid">
      <p class="empty-text" id="initResultMsg">請先輸入關鍵字搜尋圖片</p>
    </div>
  </section>

  <section class="card">
    <h2>一鍵去背與預覽</h2>
    <div class="process-section">
      <div>
        <div class="preview-box" id="boxOriginal">
          <span class="preview-label">原圖預覽</span>
          <p class="empty-text" id="originalEmpty">請先選擇圖片</p>
          <img id="imgOriginal" class="hidden" src="" alt="原圖">
        </div>
      </div>
      <div>
        <div class="preview-box checkerboard" id="boxResult">
          <span class="preview-label">去背後預覽</span>
          <p class="empty-text" id="resultEmpty">去背結果會顯示在這裡</p>
          <canvas id="canvasResult" class="hidden"></canvas>
        </div>
      </div>
    </div>

    <div class="action-panel">
      <button class="btn-primary" id="btnRemoveBg" disabled>一鍵去背 (請先選圖)</button>
      
      <div class="fallback-tools">
        <p><strong>備用去背工具</strong> (AI 失敗時可用，適合白底或單色背景)</p>
        <div class="search-row" style="margin-top: 8px;">
          <button class="btn-secondary" id="btnWhiteRemove" disabled>白底去背</button>
          <button class="btn-secondary" id="btnPickColor" disabled>點擊圖片選色去背</button>
        </div>
        <label>
          容差 (0-100)：
          <input type="range" id="toleranceRange" min="0" max="100" value="30" disabled>
          <span id="toleranceValue">30</span>
        </label>
      </div>

      <button class="btn-primary" id="btnDownload" disabled style="background-color: var(--success);">下載透明 PNG</button>
    </div>
  </section>

  <section class="card attribution-section">
    <h2>圖片授權標示</h2>
    <div class="attr-content" id="attrContent">尚未選擇圖片</div>
    <button class="btn-secondary" id="btnCopyAttr" disabled>複製標示</button>
  </section>

</div>

<script type="module">
  import { removeBackground } from "https://cdn.jsdelivr.net/npm/@imgly/background-removal/+esm";

  // ==========================================
  // 十二、資料格式與狀態管理
  // ==========================================
  const state = {
    query: "",
    offset: 0,
    images: [], // 存放整理後的圖片資料陣列
    selectedImage: null,
    originalBlob: null,
    isProcessing: false,
    pickColorMode: false
  };

  // DOM 元素
  const el = {
    searchInput: document.getElementById('searchInput'),
    btnSearch: document.getElementById('btnSearch'),
    btnNextBatch: document.getElementById('btnNextBatch'),
    statusBar: document.getElementById('statusBar'),
    resultsGrid: document.getElementById('resultsGrid'),
    initResultMsg: document.getElementById('initResultMsg'),
    
    imgOriginal: document.getElementById('imgOriginal'),
    originalEmpty: document.getElementById('originalEmpty'),
    canvasResult: document.getElementById('canvasResult'),
    resultEmpty: document.getElementById('resultEmpty'),
    
    btnRemoveBg: document.getElementById('btnRemoveBg'),
    btnWhiteRemove: document.getElementById('btnWhiteRemove'),
    btnPickColor: document.getElementById('btnPickColor'),
    toleranceRange: document.getElementById('toleranceRange'),
    toleranceValue: document.getElementById('toleranceValue'),
    btnDownload: document.getElementById('btnDownload'),
    
    attrContent: document.getElementById('attrContent'),
    btnCopyAttr: document.getElementById('btnCopyAttr')
  };

  // ==========================================
  // 十三、JavaScript 函式實作
  // ==========================================

  /**
   * 顯示狀態提示訊息
   * @param {string} msg 訊息文字
   * @param {string} type 'info', 'error', 'success'
   */
  function showStatus(msg, type = 'info') {
    el.statusBar.style.display = 'block';
    el.statusBar.textContent = msg;
    if(type === 'error') el.statusBar.style.color = '#dc2626';
    else if(type === 'success') el.statusBar.style.color = '#059669';
    else el.statusBar.style.color = '#b45309';
  }

  /**
   * 重置選圖與去背狀態
   */
  function resetSelection() {
    state.selectedImage = null;
    state.originalBlob = null;
    state.pickColorMode = false;
    
    el.imgOriginal.classList.add('hidden');
    el.originalEmpty.classList.remove('hidden');
    el.originalEmpty.textContent = "請先選擇圖片";
    
    el.canvasResult.classList.add('hidden');
    el.resultEmpty.classList.remove('hidden');
    el.resultEmpty.textContent = "去背結果會顯示在這裡";

    el.btnRemoveBg.disabled = true;
    el.btnRemoveBg.textContent = "一鍵去背 (請先選圖)";
    el.btnWhiteRemove.disabled = true;
    el.btnPickColor.disabled = true;
    el.btnPickColor.textContent = "點擊圖片選色去背";
    el.toleranceRange.disabled = true;
    el.btnDownload.disabled = true;

    el.attrContent.textContent = "尚未選擇圖片";
    el.btnCopyAttr.disabled = true;

    // 清除選取樣式
    document.querySelectorAll('.img-card').forEach(card => card.classList.remove('selected'));
  }

  /**
   * 觸發搜尋圖片流程
   */
  async function searchImages() {
    const query = el.searchInput.value.trim();
    if (!query) {
      showStatus("請先輸入關鍵字", "error");
      return;
    }
    state.query = query;
    state.offset = 0;
    await executeSearch();
  }

  /**
   * 觸發換一批流程
   */
  async function changeBatch() {
    if (!state.query) {
      showStatus("請先輸入關鍵字", "error");
      return;
    }
    state.offset += 50; // API 抓取量大以方便過濾尺寸
    await executeSearch();
  }

  /**
   * 執行 API 搜尋核心邏輯
   */
  async function executeSearch() {
    showStatus("搜尋中...", "info");
    resetSelection();
    el.resultsGrid.innerHTML = ''; // 清空畫面
    state.images = [];
    
    try {
      // 1. 搜尋 Wikimedia Commons
      let rawImages = await fetchWikimediaImages(state.query, state.offset);
      
      // 過濾尺寸至少 800x600
      let validImages = filterImagesBySize(rawImages);
      
      // 2. 如果不足 5 張，嘗試 Openverse
      if (validImages.length < 5) {
         const openverseImages = await fetchOpenverseImages(state.query, state.offset);
         const validOpenverse = filterImagesBySize(openverseImages);
         validImages = validImages.concat(validOpenverse);
      }

      // 取前 5 張
      state.images = validImages.slice(0, 5);

      if (state.images.length === 0) {
        showStatus("找不到圖片，請嘗試其他關鍵字", "error");
        el.resultsGrid.innerHTML = '<p class="empty-text">找不到符合尺寸的圖片</p>';
      } else {
        renderImageCards();
        showStatus(`找到 ${state.images.length} 張圖片`, "success");
      }
    } catch (err) {
      console.error(err);
      showStatus("API 搜尋失敗", "error");
    }
  }

  /**
   * 取得 Wikimedia Commons 圖片
   */
  async function fetchWikimediaImages(query, offset) {
    const url = `https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch=filetype:bitmap|drawing ${encodeURIComponent(query)}&gsrlimit=50&gsroffset=${offset}&prop=imageinfo&iiprop=url|size|extmetadata&format=json&origin=*`;
    const res = await fetch(url);
    if (!res.ok) throw new Error("Wikimedia API Error");
    const data = await res.json();
    
    const results = [];
    if (data.query && data.query.pages) {
      Object.values(data.query.pages).forEach(page => {
        if (page.imageinfo && page.imageinfo[0]) {
          const info = page.imageinfo[0];
          const meta = info.extmetadata || {};
          results.push({
            title: page.title.replace(/^File:/, ''),
            creator: meta.Artist ? meta.Artist.value.replace(/<[^>]+>/g, '') : "Unknown",
            license: meta.LicenseShortName ? meta.LicenseShortName.value : "Public Domain / CC",
            licenseUrl: meta.LicenseUrl ? meta.LicenseUrl.value : "",
            imageUrl: info.url,
            thumbnailUrl: info.url, // 簡化處理，直接用原圖當縮圖
            sourceUrl: info.descriptionurl,
            width: info.width,
            height: info.height,
            provider: "Wikimedia Commons"
          });
        }
      });
    }
    return results;
  }

  /**
   * 取得 Openverse 圖片 (備用)
   */
  async function fetchOpenverseImages(query, offset) {
    try {
      const page = Math.floor(offset / 20) + 1;
      const url = `https://api.openverse.org/v1/images/?q=${encodeURIComponent(query)}&page=${page}&page_size=20&license=cc0,pdm,by,by-sa`;
      const res = await fetch(url);
      if (!res.ok) return [];
      const data = await res.json();
      
      return (data.results || []).map(item => ({
        title: item.title,
        creator: item.creator,
        license: `CC ${item.license.toUpperCase()}`,
        licenseUrl: item.license_url,
        imageUrl: item.url,
        thumbnailUrl: item.thumbnail || item.url,
        sourceUrl: item.foreign_landing_url,
        width: item.width || 0,
        height: item.height || 0,
        provider: "Openverse"
      }));
    } catch(e) {
      console.warn("Openverse API Error", e);
      return []; // 失敗不阻斷
    }
  }

  /**
   * 篩選尺寸大於等於 800x600 的圖片
   */
  function filterImagesBySize(images) {
    return images.filter(img => img.width >= 800 && img.height >= 600);
  }

  /**
   * 渲染 5 張圖片卡片
   */
  function renderImageCards() {
    el.resultsGrid.innerHTML = '';
    state.images.forEach((img, index) => {
      const card = document.createElement('div');
      card.className = 'img-card';
      card.dataset.index = index;
      card.innerHTML = `
        <div class="badge-selected">已選取</div>
        <img src="${img.thumbnailUrl}" alt="${img.title}" loading="lazy">
        <div class="img-info">
          <div class="img-title" title="${img.title}">${img.title}</div>
          <div class="img-meta">${img.license} | ${img.width}x${img.height}</div>
          <a href="${img.sourceUrl}" target="_blank" class="img-meta" style="color:var(--primary); text-decoration:none;" onclick="event.stopPropagation()">來源連結</a>
          <button class="btn-primary img-btn-select">選擇圖片</button>
        </div>
      `;
      card.addEventListener('click', () => selectImage(index, card));
      el.resultsGrid.appendChild(card);
    });
  }

  /**
   * 選擇圖片處理
   */
  async function selectImage(index, cardEl) {
    if (state.isProcessing) return;
    
    // UI 更新
    document.querySelectorAll('.img-card').forEach(card => card.classList.remove('selected'));
    cardEl.classList.add('selected');
    
    state.selectedImage = state.images[index];
    showStatus("已選取圖片，載入中...", "info");
    
    await loadSelectedImage();
  }

  /**
   * 載入選擇的圖片，並轉為 Blob 避免跨域阻擋去背
   */
  async function loadSelectedImage() {
    resetSelection(); // 清空舊的 Canvas/Blob
    const imgData = state.selectedImage;
    if (!imgData) return;

    try {
      // 嘗試透過 CORS fetch
      const response = await fetch(imgData.imageUrl, { mode: 'cors' });
      if (!response.ok) throw new Error("CORS Error");
      state.originalBlob = await response.blob();
      
      const objectUrl = URL.createObjectURL(state.originalBlob);
      
      // 顯示原圖
      el.originalEmpty.classList.add('hidden');
      el.imgOriginal.src = objectUrl;
      el.imgOriginal.classList.remove('hidden');
      
      // 更新按鈕狀態
      el.btnRemoveBg.disabled = false;
      el.btnRemoveBg.textContent = "一鍵 AI 去背";
      el.btnWhiteRemove.disabled = false;
      el.btnPickColor.disabled = false;
      el.toleranceRange.disabled = false;

      // 更新授權標示
      el.attrContent.innerHTML = `
        圖片：${imgData.title}<br>
        作者：${imgData.creator}<br>
        授權：${imgData.license} ${imgData.licenseUrl ? `<a href="${imgData.licenseUrl}" target="_blank">[Link]</a>` : ''}<br>
        來源：<a href="${imgData.sourceUrl}" target="_blank">${imgData.sourceUrl}</a><br>
        平台：${imgData.provider}
      `;
      el.btnCopyAttr.disabled = false;

      showStatus("已選取圖片", "success");
      
      // 同時畫到結果 Canvas 上做為初始狀態 (給備用工具用)
      const tempImg = new Image();
      tempImg.onload = () => {
        el.canvasResult.width = tempImg.width;
        el.canvasResult.height = tempImg.height;
        const ctx = el.canvasResult.getContext('2d');
        ctx.drawImage(tempImg, 0, 0);
        el.resultEmpty.classList.add('hidden');
        el.canvasResult.classList.remove('hidden');
      };
      tempImg.src = objectUrl;

    } catch (error) {
      console.error(error);
      showStatus("CORS 不允許處理圖片或圖片載入失敗", "error");
    }
  }

  /**
   * 一鍵 AI 去背
   */
  async function removeSelectedImageBackground() {
    if (!state.originalBlob) {
      showStatus("請先選擇圖片", "error");
      return;
    }
    
    state.isProcessing = true;
    el.btnRemoveBg.disabled = true;
    el.btnRemoveBg.textContent = "去背中... (首次需下載模型)";
    showStatus("AI 處理中，請稍候...", "info");

    try {
      // 呼叫 @imgly/background-removal
      const resultBlob = await removeBackground(state.originalBlob);
      showRemovedResult(resultBlob);
      showStatus("去背完成", "success");
    } catch (error) {
      console.error(error);
      showStatus("AI 去背失敗，請嘗試備用工具", "error");
    } finally {
      state.isProcessing = false;
      el.btnRemoveBg.disabled = false;
      el.btnRemoveBg.textContent = "一鍵 AI 去背";
    }
  }

  /**
   * 顯示去背結果並啟用下載
   */
  function showRemovedResult(blob) {
    const objectUrl = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      el.canvasResult.width = img.width;
      el.canvasResult.height = img.height;
      const ctx = el.canvasResult.getContext('2d');
      ctx.clearRect(0, 0, el.canvasResult.width, el.canvasResult.height);
      ctx.drawImage(img, 0, 0);
      
      el.resultEmpty.classList.add('hidden');
      el.canvasResult.classList.remove('hidden');
      el.btnDownload.disabled = false;
    };
    img.src = objectUrl;
  }

  /**
   * Canvas 備用去背：白底去背
   */
  function fallbackWhiteRemove() {
    if (!state.originalBlob) return;
    executeCanvasRemove({r:255, g:255, b:255});
  }

  /**
   * 啟用點擊選色去背模式
   */
  function enablePickColor() {
    if (!state.originalBlob) return;
    state.pickColorMode = true;
    el.btnPickColor.textContent = "請點擊原圖選取背景色";
    showStatus("請在左側「原圖預覽」點擊要去除的背景顏色", "info");
  }

  /**
   * 點選背景色去背
   */
  function pickBackgroundColor(event) {
    if (!state.pickColorMode) return;
    
    const rect = el.imgOriginal.getBoundingClientRect();
    // 計算縮放比例
    const scaleX = el.imgOriginal.naturalWidth / rect.width;
    const scaleY = el.imgOriginal.naturalHeight / rect.height;
    
    let x = (event.clientX - rect.left) * scaleX;
    let y = (event.clientY - rect.top) * scaleY;
    
    // 建立暫存 canvas 取得像素顏色
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = el.imgOriginal.naturalWidth;
    tempCanvas.height = el.imgOriginal.naturalHeight;
    const ctx = tempCanvas.getContext('2d');
    ctx.drawImage(el.imgOriginal, 0, 0);
    
    const pixel = ctx.getImageData(x, y, 1, 1).data;
    const targetColor = { r: pixel[0], g: pixel[1], b: pixel[2] };
    
    state.pickColorMode = false;
    el.btnPickColor.textContent = "點擊圖片選色去背";
    executeCanvasRemove(targetColor);
  }

  /**
   * 執行 Canvas 指定顏色去背邏輯
   */
  function executeCanvasRemove(targetColor) {
    if (el.canvasResult.classList.contains('hidden')) return;
    
    // 重新從原圖繪製到結果 Canvas 以避免重複去除
    const tempImg = new Image();
    tempImg.onload = () => {
      const ctx = el.canvasResult.getContext('2d');
      ctx.clearRect(0, 0, el.canvasResult.width, el.canvasResult.height);
      ctx.drawImage(tempImg, 0, 0);
      
      const imgData = ctx.getImageData(0, 0, el.canvasResult.width, el.canvasResult.height);
      const data = imgData.data;
      const tolerance = parseInt(el.toleranceRange.value, 10);
      
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i];
        const g = data[i+1];
        const b = data[i+2];
        
        // 計算歐幾里得距離判斷容差
        const distance = Math.sqrt(
          Math.pow(r - targetColor.r, 2) + 
          Math.pow(g - targetColor.g, 2) + 
          Math.pow(b - targetColor.b, 2)
        );
        
        // 將距離 0-441 映射到容差 0-100 大約範圍
        if (distance < tolerance * 2.5) {
          data[i+3] = 0; // 透明度設為 0
        }
      }
      ctx.putImageData(imgData, 0, 0);
      el.btnDownload.disabled = false;
      showStatus("備用去背完成", "success");
    };
    tempImg.src = el.imgOriginal.src;
  }

  /**
   * 下載透明 PNG
   */
  function downloadPNG() {
    if (el.canvasResult.classList.contains('hidden')) {
      showStatus("尚未去背就下載", "error");
      return;
    }
    
    const dataUrl = el.canvasResult.toDataURL("image/png");
    const a = document.createElement("a");
    a.href = dataUrl;
    a.download = "cc-image-removed-background.png";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    showStatus("圖片已下載", "success");
  }

  /**
   * 複製授權標示
   */
  function copyAttribution() {
    const text = el.attrContent.innerText;
    if (text === "尚未選擇圖片") {
      showStatus("請先選擇圖片", "error");
      return;
    }
    navigator.clipboard.writeText(text).then(() => {
      showStatus("複製標示成功", "success");
    }).catch(err => {
      console.error(err);
      showStatus("複製標示失敗", "error");
    });
  }

  // ==========================================
  // 事件綁定
  // ==========================================
  el.btnSearch.addEventListener('click', searchImages);
  el.searchInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') searchImages(); });
  el.btnNextBatch.addEventListener('click', changeBatch);
  
  el.btnRemoveBg.addEventListener('click', removeSelectedImageBackground);
  el.btnDownload.addEventListener('click', downloadPNG);
  el.btnCopyAttr.addEventListener('click', copyAttribution);
  
  // Canvas 備用去背事件
  el.btnWhiteRemove.addEventListener('click', fallbackWhiteRemove);
  el.btnPickColor.addEventListener('click', enablePickColor);
  el.imgOriginal.addEventListener('click', pickBackgroundColor);
  el.toleranceRange.addEventListener('input', (e) => {
    el.toleranceValue.textContent = e.target.value;
  });

</script>

</body>
</html>
