<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC Image Background Remover (Pro)</title>
    <script type="importmap">
        {
            "imports": {
                "@imgly/background-removal": "https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.5/+esm"
            }
        }
    </script>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --bg: #f9fafb;
            --card: #ffffff;
            --text: #1f2937;
            --text-light: #6b7280;
            --border: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 標題與步驟 */
        header { text-align: center; margin-bottom: 10px; }
        .steps { display: flex; justify-content: center; gap: 15px; margin-top: 15px; }
        .step { background: #eff6ff; color: var(--primary); padding: 5px 15px; border-radius: 20px; font-weight: 600; font-size: 0.9rem; border: 1px solid #dbeafe; }

        /* 通用卡片 */
        .card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); }

        /* 搜尋區 */
        .search-bar { display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; }
        button { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-blue:hover { background: var(--primary-dark); }
        .btn-blue:disabled { background: #93c5fd; cursor: not-allowed; }
        .btn-gray { background: #4b5563; color: white; }
        .btn-gray:hover { background: #374151; }

        /* 狀態提示 */
        #status { font-size: 0.9rem; font-weight: 600; margin-top: 10px; min-height: 1.2rem; }
        .status-info { color: var(--primary); }
        .status-error { color: #ef4444; }
        .status-success { color: #10b981; }

        /* 圖片結果網格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }
        .img-item {
            border: 2px solid transparent;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
            background: #eee;
        }
        .img-item:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
        .img-item.selected { border-color: var(--primary); }
        .img-item img { width: 100%; height: 150px; object-fit: cover; display: block; }
        .img-info { padding: 8px; font-size: 0.75rem; background: white; }
        .selected-badge {
            position: absolute; top: 5px; right: 5px; background: var(--primary); color: white;
            padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; display: none;
        }
        .img-item.selected .selected-badge { display: block; }

        /* 去背與預覽 */
        .work-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            align-items: start;
        }
        .preview-container {
            border: 1px dashed var(--border);
            border-radius: 8px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-color: #f3f4f6;
            overflow: hidden;
        }
        .transparent-bg {
            background-image: linear-gradient(45deg, #ddd 25%, transparent 25%), linear-gradient(-45deg, #ddd 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ddd 75%), linear-gradient(-45deg, transparent 75%, #ddd 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        canvas, .preview-img { max-width: 100%; max-height: 400px; object-fit: contain; }
        .label { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.5); color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; z-index: 10; }

        /* 備用工具區 */
        .fallback-box {
            margin-top: 15px;
            padding: 15px;
            background: #fdf2f2;
            border: 1px solid #fee2e2;
            border-radius: 8px;
        }
        .fallback-title { font-size: 0.85rem; font-weight: bold; color: #b91c1c; margin-bottom: 8px; }
        .controls { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .control-group { display: flex; align-items: center; gap: 5px; font-size: 0.85rem; }

        /* 授權區 */
        .attr-box { background: #f8fafc; border: 1px solid #e2e8f0; padding: 12px; border-radius: 8px; font-size: 0.85rem; font-family: monospace; white-space: pre-wrap; word-break: break-all; }

        @media (max-width: 768px) {
            .work-area { grid-template-columns: 1fr; }
            .search-bar { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 style="margin:0;">CC Image Background Remover</h1>
        <p style="color:var(--text-light); margin:5px 0;">搜尋 CC 授權圖片並進行一鍵透明去背</p>
        <div class="steps">
            <span class="step">1. 搜尋</span>
            <span class="step">2. 選圖</span>
            <span class="step">3. 去背</span>
        </div>
    </header>

    <section class="card">
        <div class="search-bar">
            <input type="text" id="keyword" placeholder="輸入關鍵字，例如：Robot, Flower, Mountains...">
            <button class="btn-blue" id="btn-search">搜尋圖片</button>
            <button class="btn-gray" id="btn-next">換一批</button>
        </div>
        <div id="status" class="status-info">準備就緒</div>
        <div id="image-grid" class="grid"></div>
    </section>

    <section class="card">
        <div class="work-area">
            <div>
                <div class="preview-container">
                    <span class="label">原圖預覽 (點選圖片可取色)</span>
                    <img id="ori-preview" class="preview-img" style="display:none;" crossorigin="anonymous">
                    <p id="ori-placeholder" style="color:var(--text-light);">請先從上方搜尋並選擇圖片</p>
                </div>
            </div>
            <div>
                <div class="preview-container transparent-bg">
                    <span class="label">去背結果</span>
                    <canvas id="res-canvas" style="display:none;"></canvas>
                    <p id="res-placeholder" style="color:var(--text-light);">等待去背處理...</p>
                </div>
            </div>
        </div>

        <div style="margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn-blue" id="btn-ai-remove" disabled>✨ 一鍵 AI 去背</button>
            <button class="btn-gray" id="btn-download" disabled>下載透明 PNG</button>
        </div>

        <div class="fallback-box">
            <div class="fallback-title">手動/備用去背工具 (適合 AI 失敗或單色背景)</div>
            <div class="controls">
                <button class="btn-gray" style="font-size:0.8rem;" id="btn-white-remove">去除純白背景</button>
                <div class="control-group">
                    <span>容差:</span>
                    <input type="range" id="tolerance" min="1" max="100" value="30">
                    <span id="tol-val">30</span>
                </div>
                <div class="control-group" id="color-indicator" style="display:none;">
                    <span>選取色:</span>
                    <div id="color-swatch" style="width:20px; height:20px; border:1px solid #000;"></div>
                </div>
            </div>
        </div>
    </section>

    <section class="card">
        <h3 style="margin-top:0; font-size:1rem;">授權與來源標示</h3>
        <div class="attr-box" id="attr-text">尚未選擇圖片</div>
        <button class="btn-gray" id="btn-copy" style="margin-top:10px; font-size:0.8rem;">複製標示文字</button>
    </section>
</div>

<script type="module">
    import { removeBackground } from "@imgly/background-removal";

    const state = {
        images: [],
        selectedIndex: -1,
        currentOffset: 0,
        isProcessing: false,
        pickedColor: null
    };

    // DOM 元素
    const dom = {
        keyword: document.getElementById('keyword'),
        btnSearch: document.getElementById('btn-search'),
        btnNext: document.getElementById('btn-next'),
        grid: document.getElementById('image-grid'),
        status: document.getElementById('status'),
        oriPreview: document.getElementById('ori-preview'),
        oriPlaceholder: document.getElementById('ori-placeholder'),
        resCanvas: document.getElementById('res-canvas'),
        resPlaceholder: document.getElementById('res-placeholder'),
        btnAi: document.getElementById('btn-ai-remove'),
        btnDownload: document.getElementById('btn-download'),
        btnCopy: document.getElementById('btn-copy'),
        attrText: document.getElementById('attr-text'),
        tolerance: document.getElementById('tolerance'),
        tolVal: document.getElementById('tol-val'),
        btnWhite: document.getElementById('btn-white-remove')
    };

    // 更新狀態顯示
    function setStatus(msg, type = 'info') {
        dom.status.textContent = msg;
        dom.status.className = `status-${type}`;
    }

    // 搜尋 Wikimedia
    async function searchImages(isNext = false) {
        const q = dom.keyword.value.trim();
        if (!q) return setStatus("請輸入關鍵字", "error");

        if (!isNext) state.currentOffset = 0;
        setStatus("搜尋中...");
        dom.grid.innerHTML = "";

        try {
            const url = `https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch=filetype:bitmap|drawing ${encodeURIComponent(q)}&gsrlimit=20&gsroffset=${state.currentOffset}&prop=imageinfo&iiprop=url|size|extmetadata&format=json&origin=*`;
            const res = await fetch(url);
            const data = await res.json();

            if (!data.query) {
                setStatus("找不到相關圖片", "error");
                return;
            }

            const rawList = Object.values(data.query.pages);
            const filtered = rawList
                .filter(p => p.imageinfo && p.imageinfo[0].width >= 800)
                .slice(0, 5)
                .map(p => {
                    const info = p.imageinfo[0];
                    const meta = info.extmetadata || {};
                    return {
                        title: p.title.replace("File:", ""),
                        imageUrl: info.url,
                        sourceUrl: info.descriptionurl,
                        creator: meta.Artist ? meta.Artist.value.replace(/<[^>]+>/g, '') : '未知',
                        license: meta.LicenseShortName ? meta.LicenseShortName.value : 'CC/Public Domain',
                        provider: 'Wikimedia Commons',
                        width: info.width,
                        height: info.height
                    };
                });

            state.images = filtered;
            renderGrid();
            setStatus(`找到 ${filtered.length} 張圖片`);
            state.currentOffset += 20;
        } catch (err) {
            setStatus("搜尋失敗，請稍後再試", "error");
        }
    }

    function renderGrid() {
        dom.grid.innerHTML = state.images.map((img, i) => `
            <div class="img-item" onclick="window.selectImg(${i})">
                <div class="selected-badge">已選</div>
                <img src="${img.imageUrl}" crossorigin="anonymous">
                <div class="img-info">
                    <strong>${img.title.substring(0, 20)}...</strong><br>
                    ${img.width} x ${img.height}
                </div>
            </div>
        `).join('');
    }

    window.selectImg = (idx) => {
        state.selectedIndex = idx;
        const img = state.images[idx];
        
        // 更新網格選取樣式
        document.querySelectorAll('.img-item').forEach((el, i) => {
            el.classList.toggle('selected', i === idx);
        });

        // 載入預覽
        dom.oriPlaceholder.style.display = "none";
        dom.oriPreview.style.display = "block";
        dom.oriPreview.src = img.imageUrl;
        
        // 重置結果區
        dom.resCanvas.style.display = "none";
        dom.resPlaceholder.style.display = "block";
        dom.resPlaceholder.textContent = "等待去背...";
        
        dom.btnAi.disabled = false;
        dom.btnDownload.disabled = true;

        // 更新標示
        state.pickedColor = null;
        document.getElementById('color-indicator').style.display = 'none';
        
        const attr = `圖片：${img.title}\n作者：${img.creator}\n授權：${img.license}\n來源：${img.sourceUrl}\n平台：${img.provider}`;
        dom.attrText.textContent = attr;
        dom.btnCopy.disabled = false;
        
        setStatus("已選取圖片，可以開始去背");
    };

    // AI 去背
    async function runAiRemove() {
        if (state.isProcessing || state.selectedIndex === -1) return;
        
        state.isProcessing = true;
        dom.btnAi.disabled = true;
        dom.btnAi.textContent = "⌛ 處理中 (首次需約 30 秒)...";
        setStatus("正在載入 AI 模型並處理圖片，請勿離開...");

        try {
            // 獲取圖片 Blob
            const response = await fetch(dom.oriPreview.src, { mode: 'cors' });
            const blob = await response.blob();

            // 執行去背 (配置資源路徑避免 404)
            const resultBlob = await removeBackground(blob, {
                progress: (step, current, total) => {
                    setStatus(`AI 處理中: ${step} (${Math.round(current/total*100)}%)`);
                }
            });

            const url = URL.createObjectURL(resultBlob);
            drawBlobToCanvas(url);
            setStatus("去背完成！", "success");
        } catch (err) {
            console.error(err);
            setStatus("AI 去背失敗，可能受限於瀏覽器記憶體或圖片安全協議 (CORS)", "error");
        } finally {
            state.isProcessing = false;
            dom.btnAi.disabled = false;
            dom.btnAi.textContent = "✨ 一鍵 AI 去背";
        }
    }

    function drawBlobToCanvas(url) {
        const img = new Image();
        img.onload = () => {
            dom.resCanvas.width = img.width;
            dom.resCanvas.height = img.height;
            const ctx = dom.resCanvas.getContext('2d');
            ctx.clearRect(0,0,img.width, img.height);
            ctx.drawImage(img, 0, 0);
            
            dom.resPlaceholder.style.display = "none";
            dom.resCanvas.style.display = "block";
            dom.btnDownload.disabled = false;
        };
        img.src = url;
    }

    // 手動去背 (Canvas 像素操作)
    function manualRemove(targetR, targetG, targetB) {
        if (!dom.oriPreview.src) return;
        
        const canvas = dom.resCanvas;
        const ctx = canvas.getContext('2d');
        const img = dom.oriPreview;
        
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        ctx.drawImage(img, 0, 0);
        
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        const tol = parseInt(dom.tolerance.value);

        for (let i = 0; i < data.length; i += 4) {
            const r = data[i];
            const g = data[i+1];
            const b = data[i+2];
            
            // 計算顏色距離 (歐幾里得距離)
            // $d = \sqrt{(r_1-r_2)^2 + (g_1-g_2)^2 + (b_1-b_2)^2}$
            const diff = Math.sqrt(
                Math.pow(r - targetR, 2) +
                Math.pow(g - targetG, 2) +
                Math.pow(b - targetB, 2)
            );

            if (diff < tol * 2) {
                data[i+3] = 0; // 設為透明
            }
        }

        ctx.putImageData(imageData, 0, 0);
        dom.resPlaceholder.style.display = "none";
        dom.resCanvas.style.display = "block";
        dom.btnDownload.disabled = false;
        setStatus("手動去背處理完成");
    }

    // 點擊原圖選色
    dom.oriPreview.addEventListener('click', (e) => {
        if (!dom.oriPreview.src) return;
        const canvas = document.createElement('canvas');
        canvas.width = dom.oriPreview.naturalWidth;
        canvas.height = dom.oriPreview.naturalHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(dom.oriPreview, 0, 0);

        const rect = dom.oriPreview.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        
        const p = ctx.getImageData(x, y, 1, 1).data;
        state.pickedColor = { r: p[0], g: p[1], b: p[2] };
        
        document.getElementById('color-indicator').style.display = 'flex';
        document.getElementById('color-swatch').style.backgroundColor = `rgb(${p[0]},${p[1]},${p[2]})`;
        
        manualRemove(p[0], p[1], p[2]);
    });

    // 事件監聽
    dom.btnSearch.addEventListener('click', () => searchImages(false));
    dom.btnNext.addEventListener('click', () => searchImages(true));
    dom.btnAi.addEventListener('click', runAiRemove);
    dom.btnWhite.addEventListener('click', () => manualRemove(255, 255, 255));
    dom.tolerance.addEventListener('input', (e) => {
        dom.tolVal.textContent = e.target.value;
        if (state.pickedColor) manualRemove(state.pickedColor.r, state.pickedColor.g, state.pickedColor.b);
    });

    dom.btnDownload.addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = 'cc-image-transparent.png';
        link.href = dom.resCanvas.toDataURL();
        link.click();
    });

    dom.btnCopy.addEventListener('click', () => {
        navigator.clipboard.writeText(dom.attrText.textContent);
        const oldText = dom.btnCopy.textContent;
        dom.btnCopy.textContent = "✅ 已複製";
        setTimeout(() => dom.btnCopy.textContent = oldText, 2000);
    });

</script>

</body>
</html>
